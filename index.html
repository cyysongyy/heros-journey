// ENGINE: CONFESSION (Stage 10)
// ═══════════════════════════════════════════════════════════
function engineConfession(num, area){
  const lang=L();
  const st=STAGES[num];
  const confessions=[];
  // Build questions from past choices
  const questions=[];
  if(G.killedHumbaba!==null){
    questions.push({
      zh:{context:`在第五關，你${G.killedHumbaba?'殺死了':'放走了'}洪巴巴。`,
          q:'你為什麼做出這個選擇？'},
      en:{context:`In Stage 5, you ${G.killedHumbaba?'slew':'spared'} Humbaba.`,
          q:'Why did you make that choice?'},
    });
  }
  if(G.s2SoulWord){
    questions.push({
      zh:{context:`在第二關，你在水面上看見的字是：「${G.s2SoulWord}」。`,q:'這個字代表了什麼？'},
      en:{context:`In Stage 2, the word you saw in the water was: "${G.s2SoulWord}".`,q:'What does that word represent?'},
    });
  }
  if(G.choices['enkidu_gratitude']){
    questions.push({
      zh:{context:`你感謝恩基杜的是：「${G.choices['enkidu_gratitude']}」。`,q:'這份感謝如何改變了你？'},
      en:{context:`You were grateful to Enkidu for: "${G.choices['enkidu_gratitude']}".`,q:'How has this gratitude changed you?'},
    });
  }
  // Add generic if none
  if(!questions.length){
    questions.push({
      zh:{context:'你走過了艱難的旅程。',q:'在這段旅程中，你最誠實地承認自己失去了什麼？'},
      en:{context:'You have traveled a difficult journey.',q:'What is the most honest thing you admit to having lost along the way?'},
    });
  }

  let qi=0;
  function renderQ(){
    if(qi>=questions.length){
      // Scale ritual + orpheus
      showOrpheusQuestion(num, area);
      return;
    }
    const q=questions[qi];
    const info=q[lang]||q.zh;
    area.innerHTML=`<div id="confession-game">
      <div style="text-align:center;font-size:28px;margin-bottom:12px">⚖️</div>
      <div class="confession-judge">${lang==='zh'?
        `法官 ${qi+1}/${questions.length} 問：${info.q}`:`Judge ${qi+1}/${questions.length} asks: ${info.q}`}</div>
      <div class="confession-context">${info.context}</div>
      <textarea id="conf-input" class="soul-input" placeholder="${t('soulPrompt')}" style="width:100%;min-height:70px;padding:10px;background:rgba(255,255,255,0.05);border:1px solid var(--gold);color:var(--text);font-size:14px;font-family:inherit;resize:none;border-radius:2px"></textarea>
      <div style="text-align:right;margin-top:10px">
        <button class="btn btn-sm" onclick="submitConf(${num})">${t('submit')}</button>
      </div>
    </div>`;
    setProgress(Math.round(qi/questions.length*60));
  }

  window.submitConf=(stNum)=>{
    if(stNum!==num) return;
    const val=document.getElementById('conf-input').value.trim();
    if(!val){notify(lang==='zh'?'請寫下你的回答':'Please write your answer');return;}
    const q=questions[qi];
    const info=q[lang]||q.zh;
    confessions.push({q:info.q,a:val});
    addJournal((st[lang]||st.zh).title,`⚖️ "${info.q}" → "${val}"`);
    qi++;
    renderQ();
  };
  renderQ();
}

function showOrpheusQuestion(num, area){
  const lang=L();
  const st=STAGES[num];
  const oq=st.orpheusQuestion?.[lang]||st.orpheusQuestion?.zh||'';
  area.innerHTML=`<div style="text-align:center;max-width:480px">
    <img src="./images/img22.png" alt="Orpheus" style="width:80px;height:80px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;margin-bottom:16px" onerror="this.style.display='none'">
    <div style="color:var(--gold-light);font-size:15px;line-height:1.7;margin-bottom:16px">${oq}</div>
    <textarea id="orpheus-input" placeholder="${t('soulPrompt')}" style="width:100%;min-height:70px;padding:10px;background:rgba(255,255,255,0.05);border:1px solid var(--gold);color:var(--text);font-size:14px;font-family:inherit;resize:none;border-radius:2px"></textarea>
    <div style="text-align:right;margin-top:10px">
      <button class="btn btn-sm" onclick="submitOrpheus(${num})">${t('submit')}</button>
    </div>
  </div>`;
  window.submitOrpheus=(stNum)=>{
    if(stNum!==num) return;
    const val=document.getElementById('orpheus-input').value.trim();
    if(!val){notify(lang==='zh'?'請寫下你的回答':'Please write your answer');return;}
    G.orpheusAnswer=val;
    addJournal((st[lang]||st.zh).title,`🎵 ${lang==='zh'?'奧菲斯的問題':"Orpheus' Question"}: "${val}"`);
    applyAttr({heart:2,wisdom:1});
    setProgress(100);
    setTimeout(()=>stageComplete(num),600);
  };
}

// ═══════════════════════════════════════════════════════════
// ENGINE: SAIL (Stage 11)
// ═══════════════════════════════════════════════════════════
function engineSail(num, area){
  const lang=L();
  const st=STAGES[num];
  const W=460,H=300;
  let shipX=60,shipY=150,islandPhase=0,resisted=0;
  let siren=false,circe=false,calypso=false;
  let gameActive=true;
  const islands=[
    {x:160,y:80,icon:'🧜‍♀️',zh:{name:'塞壬之島',tip:'舊日榮耀的回憶讓你沉溺'},en:{name:"Sirens' Rock",tip:'Memories of past glory draw you in'}},
    {x:280,y:170,icon:'🌺',zh:{name:'瑟西的花園',tip:'舒適陷阱：「這裡沒有危險。」'},en:{name:"Circe's Garden",tip:'Comfort trap: "There is no danger here."'}},
    {x:390,y:80,icon:'🕊️',zh:{name:'卡呂普索的洞穴',tip:'愛與永生的承諾'},en:{name:"Calypso's Cave",tip:'Promise of love and immortality'}},
  ];
  const danger=[{x:130,y:150},{x:250,y:120},{x:360,y:150}];
  let attractTimer;

  area.innerHTML=`<div id="sail-game">
    <div style="color:var(--gold-light);font-size:13px;margin-bottom:8px">${lang==='zh'?
      '駕船穿越愛琴海。避開誘惑島嶼，直達彼岸！用滑鼠/點擊移動船隻。':
      'Sail across the Aegean. Avoid the temptation islands and reach the far shore! Click/hover to steer.'}</div>
    <canvas id="sail-canvas" width="${W}" height="${H}"></canvas>
    <div class="sail-hint" id="sail-hint">${lang==='zh'?'🌊 抵禦誘惑，不要靠近島嶼！':'🌊 Resist temptation — do not approach the islands!'}</div>
    <div id="sail-resist" style="color:var(--green);font-size:13px;margin-top:6px">${lang==='zh'?`已抵禦：${resisted}/3`:`Resisted: ${resisted}/3`}</div>
  </div>`;

  const canvas=document.getElementById('sail-canvas');
  const ctx=canvas.getContext('2d');
  let animId;

  function draw(){
    ctx.clearRect(0,0,W,H);
    // ocean
    const gr=ctx.createLinearGradient(0,0,0,H);
    gr.addColorStop(0,'#0a2040'); gr.addColorStop(1,'#0a1030');
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
    // waves
    for(let y=20;y<H;y+=30){
      ctx.strokeStyle='rgba(80,120,200,0.15)'; ctx.lineWidth=1;
      ctx.beginPath();
      for(let x=0;x<W;x+=20) ctx.quadraticCurveTo(x+10,y+5,x+20,y);
      ctx.stroke();
    }
    // goal line
    ctx.strokeStyle='rgba(80,200,112,0.5)'; ctx.setLineDash([6,4]); ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(W-20,0); ctx.lineTo(W-20,H); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(80,200,112,0.7)'; ctx.font='11px Georgia';
    ctx.fillText(lang==='zh'?'彼岸':'Far Shore',W-58,20);
    // islands
    islands.forEach((isl,i)=>{
      const done=[siren,circe,calypso][i];
      ctx.font='28px serif'; ctx.globalAlpha=done?0.3:1;
      ctx.fillText(isl.icon,isl.x,isl.y);
      ctx.globalAlpha=1;
      // attraction radius
      if(!done){
        ctx.strokeStyle='rgba(200,80,200,0.2)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.arc(isl.x,isl.y,55,0,Math.PI*2); ctx.stroke();
      }
    });
    // danger rocks
    danger.forEach(d=>{
      ctx.font='16px serif'; ctx.fillText('🪨',d.x,d.y);
    });
    // ship
    ctx.font='24px serif'; ctx.fillText('⛵',shipX,shipY);
  }

  function checkIslands(){
    islands.forEach((isl,i)=>{
      const done=[siren,circe,calypso][i];
      if(done) return;
      const dist=Math.hypot(shipX-isl.x,shipY-isl.y);
      if(dist<55){
        // pull toward island
        const info=isl[lang]||isl.zh;
        document.getElementById('sail-hint').textContent=`⚠️ ${info.tip}`;
        if(dist<30){
          // too close, resist minigame
          resistIsland(i);
        }
      }
    });
    if(shipX>=W-30){
      gameActive=false;
      cancelAnimationFrame(animId);
      G.s11Resisted=resisted;
      applyAttr({heart:2,wisdom:1});
      addJournal((st[lang]||st.zh).title,lang==='zh'?
        `⛵ 你成功航過了愛琴海，抵禦了 ${resisted}/3 個誘惑。`:
        `⛵ You sailed across the Aegean, resisting ${resisted}/3 temptations.`);
      setTimeout(()=>stageComplete(num),600);
    }
  }

  let resistInProgress=false;
  function resistIsland(idx){
    if(resistInProgress) return;
    const done=[siren,circe,calypso];
    if(done[idx]) return;
    resistInProgress=true;
    const lang2=lang;
    const isl=islands[idx];
    const info=isl[lang2]||isl.zh;
    // Show resist panel
    const popup=document.createElement('div');
    popup.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:80;display:flex;align-items:center;justify-content:center';
    const anchor=G.choices['enkidu_gratitude']||G.s2SoulWord||'你的旅程';
    popup.innerHTML=`<div style="background:var(--panel);border:1px solid var(--gold);padding:24px;max-width:400px;border-radius:4px;text-align:center">
      <div style="font-size:36px;margin-bottom:12px">${isl.icon}</div>
      <div style="color:var(--gold-light);font-size:15px;margin-bottom:12px">${info.name}</div>
      <div style="color:var(--text);font-size:13px;line-height:1.7;margin-bottom:20px">${
        idx===2&&anchor?
          (lang2==='zh'?`卡呂普索說：「我可以給你恩基杜所失去的東西。」<br>但你想起了：<em>"${anchor}"</em>`
            :`Calypso says: "I can give back what Enkidu lost." But you remember: <em>"${anchor}"</em>`):
          (lang2==='zh'?`${info.tip}。但你知道你必須回去。`:`${info.tip}. But you know you must return.`)
      }</div>
      <button class="btn btn-sm btn-danger" onclick="this.closest('div[style*=fixed]').remove();resistInProgress=false;notResist(${idx})">${lang2==='zh'?'留下來':'Stay'}</button>
      &nbsp;&nbsp;
      <button class="btn btn-sm btn-green" onclick="this.closest('div[style*=fixed]').remove();resistInProgress=false;doResist(${idx})">${lang2==='zh'?'繼續前行':'Press On'}</button>
    </div>`;
    document.body.appendChild(popup);
    window.doResist=(i)=>{
      if(i===0) siren=true;
      else if(i===1) circe=true;
      else calypso=true;
      resisted++;
      document.getElementById('sail-resist').textContent=lang2==='zh'?`已抵禦：${resisted}/3`:`Resisted: ${resisted}/3`;
      applyAttr({heart:1});
      notify(lang2==='zh'?'你抵禦了誘惑！繼續前行。':'You resisted! Keep sailing.',2000);
    };
    window.notResist=(i)=>{
      applyAttr({heart:-1,wisdom:1});
      notify(lang2==='zh'?'你在島上停留了一陣，但最終還是繼續了。':'You lingered on the island, but eventually sailed on.',2500);
      if(i===0) siren=true; else if(i===1) circe=true; else calypso=true;
    };
  }

  canvas.addEventListener('mousemove',e=>{
    if(!gameActive) return;
    const r=canvas.getBoundingClientRect();
    const tx=(e.clientX-r.left)*(W/r.width);
    const ty=(e.clientY-r.top)*(H/r.height);
    shipX+=(tx-shipX)*0.08;
    shipY+=(ty-shipY)*0.08;
    shipX=Math.max(20,Math.min(W-30,shipX));
    shipY=Math.max(20,Math.min(H-30,shipY));
  });
  canvas.addEventListener('click',e=>{
    if(!gameActive) return;
    const r=canvas.getBoundingClientRect();
    shipX=(e.clientX-r.left)*(W/r.width);
    shipY=(e.clientY-r.top)*(H/r.height);
  });

  function loop(){
    if(!gameActive) return;
    // auto-advance ship rightward
    shipX+=0.4;
    draw();
    checkIslands();
    setProgress(Math.round(shipX/W*90));
    animId=requestAnimationFrame(loop);
  }
  loop();
  currentStageEngine={stop:()=>{gameActive=false;cancelAnimationFrame(animId);}};
}

// ═══════════════════════════════════════════════════════════
// ENGINE: RETURN (Stage 12)
// ═══════════════════════════════════════════════════════════
function engineReturn(num, area){
  const lang=L();
  const st=STAGES[num];
  const spots=st.hotspots;
  const req=st.requiredVisits||5;
  let visited=0;
  // Journal review first
  area.innerHTML=`<div style="text-align:center;max-width:500px">
    <div style="color:var(--gold-light);font-size:16px;margin-bottom:12px">📖 ${lang==='zh'?'英雄日誌回顧':'Journal Review'}</div>
    <div style="max-height:200px;overflow-y:auto;text-align:left;background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.2);padding:12px;border-radius:2px;margin-bottom:20px">
      ${G.journal.length?G.journal.map(j=>`<div style="margin-bottom:8px;font-size:12px;color:var(--text)">
        <span style="color:var(--gold);font-size:10px">${j.stage}</span><br>${j.text}
      </div>`).join(''):(`<div style="color:rgba(200,180,140,0.4);font-size:13px">${lang==='zh'?'（日誌是空的）':'(Journal is empty)'}</div>`)}
    </div>
    <button class="btn btn-sm" onclick="startReturnExplore(${num})">${lang==='zh'?'繼續探索城牆':'Continue — Explore the City Walls'}</button>
  </div>`;

  window.startReturnExplore=(stNum)=>{
    if(stNum!==num) return;
    const wrap=document.createElement('div');
    wrap.className='hotspot-map';
    wrap.innerHTML=`<img src="${st.bg}" alt="" style="width:100%;max-height:50vh;object-fit:cover;border-radius:4px;border:1px solid rgba(201,168,76,0.2)">
      <div style="color:rgba(200,180,140,0.6);font-size:12px;text-align:center;margin-top:6px">${lang==='zh'?'同樣的地點，不同的你。點擊探索所有5個地點。':'Same places, a different you. Click to explore all 5 locations.'}</div>`;
    area.innerHTML='';
    area.appendChild(wrap);
    spots.forEach(sp=>{
      const info=sp[lang]||sp.zh;
      const btn=document.createElement('div');
      btn.className='hotspot';
      btn.style.left=sp.x; btn.style.top=sp.y;
      btn.innerHTML=`<div class="hotspot-ring">${sp.icon}</div>
        <div class="hotspot-tooltip">${info.name}</div>`;
      btn.addEventListener('click',()=>{
        if(btn.classList.contains('visited')) return;
        btn.classList.add('visited');
        visited++;
        showDialogue([{who:info.name, text:info.result, portrait:st.portrait}],()=>{
          setProgress(Math.round(visited/req*60));
          if(visited>=req) showFinalQuestion(num);
        });
      });
      wrap.appendChild(btn);
    });
  };
}

function showFinalQuestion(num){
  const lang=L();
  const st=STAGES[num];
  const q=st.finalQuestion?.[lang]||st.finalQuestion?.zh||'你的英雄旅程帶給你的最重要的一樣東西，是什麼？';
  const area=document.getElementById('game-area');
  area.innerHTML=`<div style="text-align:center;max-width:480px">
    <div style="font-size:36px;margin-bottom:16px">🌟</div>
    <div style="color:var(--gold-light);font-size:16px;line-height:1.7;margin-bottom:20px">${q}</div>
    <textarea id="final-input" placeholder="${t('soulPrompt')}" style="width:100%;min-height:80px;padding:12px;background:rgba(255,255,255,0.05);border:1px solid var(--gold);color:var(--text);font-size:15px;font-family:inherit;resize:none;border-radius:2px"></textarea>
    <div style="text-align:right;margin-top:12px">
      <button class="btn" onclick="submitFinal(${num})">${lang==='zh'?'完成旅程 · COMPLETE':'Complete the Journey'}</button>
    </div>
  </div>`;
  window.submitFinal=(stNum)=>{
    if(stNum!==num) return;
    const val=document.getElementById('final-input').value.trim();
    if(!val){notify(lang==='zh'?'請寫下你的答案':'Please write your answer');return;}
    G.finalAnswer=val;
    addJournal((st[lang]||st.zh).title,`✨ ${lang==='zh'?'最終的靈丹':'The Elixir'}: "${val}"`);
    applyAttr({courage:1,wisdom:1,heart:1});
    setProgress(100);
    setTimeout(()=>stageComplete(num),400);
  };
}

// ═══════════════════════════════════════════════════════════
// SOUL INPUT HELPER
// ═══════════════════════════════════════════════════════════
function showSoulInput(question, callback){
  const lang=L();
  const popup=document.createElement('div');
  popup.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:90;display:flex;align-items:center;justify-content:center';
  popup.innerHTML=`<div style="background:var(--panel);border:1px solid var(--gold);padding:28px;max-width:420px;width:90%;border-radius:4px;text-align:center">
    <div style="font-size:28px;margin-bottom:14px">💧</div>
    <div style="color:var(--gold-light);font-size:15px;line-height:1.7;margin-bottom:18px">${question}</div>
    <textarea id="soul-inp" placeholder="${t('soulPrompt')}" style="width:100%;min-height:70px;padding:10px;background:rgba(255,255,255,0.05);border:1px solid var(--gold);color:var(--text);font-size:14px;font-family:inherit;resize:none;border-radius:2px"></textarea>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:16px">
      <button class="btn btn-sm" style="border-color:rgba(200,180,140,0.4);color:rgba(200,180,140,0.6)" onclick="
        const v=document.getElementById('soul-inp').value.trim()||'…';
        this.closest('div[style*=fixed]').remove();
        (${callback.toString()})(v);
      ">${lang==='zh'?'略過':'Skip'}</button>
      <button class="btn btn-sm" onclick="
        const v=document.getElementById('soul-inp').value.trim();
        if(!v){return;}
        this.closest('div[style*=fixed]').remove();
        (${callback.toString()})(v);
      ">${t('submit')}</button>
    </div>
  </div>`;
  document.body.appendChild(popup);
}

// ─────────────────────────────────────────────────────────
// ENDING
// ─────────────────────────────────────────────────────────
function showEnding(){
  showScreen('ending-screen');
  const {courage,wisdom,heart} = G.attrs;
  let title,desc,motto;
  const lang=L();
  if(courage>=wisdom&&courage>=heart){
    title=lang==='zh'?'⚔️ 烈焰英雄':'⚔️ Hero of Flames';
    desc=lang==='zh'?'你的故事成為後人的戰歌。每一個面對黑暗的人，都會想起你曾跨越的那道門。':'Your story became the battle-hymn of those who came after. All who face darkness remember the threshold you crossed.';
    motto=lang==='zh'?'「恐懼存在，但你比恐懼更真實。」':'"Fear exists — but you are more real than your fear."';
  } else if(wisdom>=courage&&wisdom>=heart){
    title=lang==='zh'?'🌙 星海智者':'🌙 Star-Sea Sage';
    desc=lang==='zh'?'你的洞見改變了烏魯克的法律。不是用劍，而是用你在旅程中獲得的理解。':'Your insight changed the laws of Uruk — not by sword, but by the understanding you gathered along the way.';
    motto=lang==='zh'?'「不朽，在你留下的思想。」':'"Immortality lives in the thoughts you leave behind."';
  } else if(heart>=courage&&heart>=wisdom){
    title=lang==='zh'?'❤️ 深淵慈人':'❤️ Compassion from the Abyss';
    desc=lang==='zh'?'你的名字成為「有人陪伴的」的代名詞。你帶回來的，不是永生，而是永遠不再讓人孤獨的決心。':'Your name became a synonym for "being accompanied." What you brought back was not immortality, but the resolve that no one should be alone.';
    motto=lang==='zh'?'「你遇見了恩基杜，你才真正成為了你。」':'"You met Enkidu — and only then did you truly become yourself."';
  } else {
    title=lang==='zh'?'💎 完整的人':'💎 The Complete Human';
    desc=lang==='zh'?'吉爾伽美什在城牆上刻下了他的故事——這本書就是你看的這個。你是第一個完整的人類英雄。':'Gilgamesh inscribed his story on the city walls — and that story is the one you just lived. You are the first complete human hero.';
    motto=lang==='zh'?'「不朽，不在永生。不朽，在你留下的事物。」':'"Immortality is not in living forever. It is in what you leave behind."';
  }
  document.getElementById('end-hero-title').textContent=title;
  document.getElementById('end-description').textContent=desc;
  document.getElementById('end-motto').textContent=motto;
  document.getElementById('t-end-label').textContent=t('endLabel');
  document.getElementById('t-restart-btn').textContent=t('restart');
  const epitaph = document.getElementById('end-epitaph');
  epitaph.innerHTML=(lang==='zh'?
    `<em>「爬上城牆，走在上面，看那基礎，看那磚石工事；它的磚石是不是窯燒的？它的地基是不是七賢者鑄就的？這是烏魯克。」</em><br><br>` :
    `<em>"Climb the wall of Uruk, walk along it; inspect its foundation, examine its brickwork — is it not burnt brick? Did not the Seven Sages lay its foundations? That is Uruk."</em><br><br>`)
    +(G.finalAnswer?`<div style="margin-top:16px;color:var(--gold)">${lang==='zh'?'你帶走的：':'What you carry:' } <em>"${G.finalAnswer}"</em></div>`:'');
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  // Lang button
  document.getElementById('lang-btn').textContent='EN';
  // Close journal on overlay click
  document.getElementById('modal-overlay').addEventListener('click',e=>{
    if(e.target===document.getElementById('modal-overlay')){
      document.getElementById('modal-overlay').style.display='none';
      document.querySelectorAll('.attr-popup').forEach(p=>p.remove());
    }
  });
  // Keyboard: ESC closes journal
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      closeJournal();
      document.querySelectorAll('div[style*="position:fixed"][style*="z-index:8"]').forEach(p=>p.remove());
      document.querySelectorAll('div[style*="position:fixed"][style*="z-index:9"]').forEach(p=>p.remove());
    }
  });
  // Title screen animation
  const titleImg=document.querySelector('.title-hero-img');
  if(titleImg){
    titleImg.style.animation='float-hero 3s ease-in-out infinite';
    const s=document.createElement('style');
    s.textContent='@keyframes float-hero{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.03)}}';
    document.head.appendChild(s);
  }
});
</script>
