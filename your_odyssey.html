<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>你的英雄旅程 · Your Own Odyssey</title>
<style>
:root{
  --gold:#c9a84c; --gold-light:#e8d48a; --green:#5ac878; --ink:#0a0820;
  --panel:#141024; --text:#e7e0d0; --muted:rgba(200,180,140,0.6);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:#07050f; color:var(--text);
  font-family:"Noto Serif TC","Songti TC",Georgia,"Times New Roman",serif;
  overflow:hidden; -webkit-tap-highlight-color:transparent;
}
#app{position:fixed;inset:0;overflow:hidden;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.screen.active{display:flex;}

/* top buttons */
#lang-btn,#music-btn{
  position:fixed;top:14px;z-index:1000;background:rgba(0,0,0,0.55);
  border:1px solid var(--gold);color:var(--gold);cursor:pointer;border-radius:3px;
  font-family:inherit;letter-spacing:1px;
}
#lang-btn{right:14px;padding:6px 14px;font-size:12px;}
#music-btn{right:74px;padding:6px 9px;font-size:14px;line-height:1;}
#music-btn.muted{opacity:0.5;}

/* title */
#title{background:radial-gradient(ellipse at 50% 30%,#1b1240 0%,#0a0820 55%,#06040e 100%);}
.stars{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle at 22% 28%,rgba(201,168,76,0.12) 0,transparent 45%),
             radial-gradient(circle at 78% 22%,rgba(120,90,200,0.14) 0,transparent 42%);}
.hero-circle{width:min(260px,62vw);height:min(260px,62vw);border-radius:50%;object-fit:cover;
  border:3px solid var(--gold);box-shadow:0 0 50px rgba(201,168,76,0.35),inset 0 0 25px rgba(0,0,0,0.6);
  margin-bottom:26px;animation:float 4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.t-zh{font-size:clamp(30px,8vw,46px);color:var(--gold-light);letter-spacing:10px;text-shadow:0 0 24px rgba(201,168,76,0.5);}
.t-en{font-size:14px;letter-spacing:6px;color:var(--muted);margin-top:10px;}
.t-sub{font-size:13px;color:var(--muted);margin:26px 0 34px;text-align:center;line-height:1.9;max-width:520px;}
.btn{padding:14px 42px;background:linear-gradient(135deg,rgba(201,168,76,0.2),rgba(120,80,200,0.2));
  border:1px solid var(--gold);color:var(--gold-light);font-size:16px;letter-spacing:3px;cursor:pointer;
  border-radius:3px;font-family:inherit;transition:all .3s;}
.btn:hover{background:linear-gradient(135deg,rgba(201,168,76,0.4),rgba(120,80,200,0.35));box-shadow:0 0 24px rgba(201,168,76,0.3);}
.btn-sm{padding:9px 22px;font-size:13px;letter-spacing:1px;}

/* journey */
#journey{padding:0;justify-content:flex-start;}
#bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.5;}
#veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,4,14,0.55) 0%,rgba(6,4,14,0.35) 40%,rgba(6,4,14,0.92) 100%);}
#top{position:relative;z-index:2;width:100%;max-width:720px;margin:0 auto;padding:58px 20px 0;}
.stage-no{font-size:12px;letter-spacing:3px;color:var(--gold);opacity:.8;}
.stage-title{font-size:clamp(20px,5.5vw,26px);color:var(--gold-light);letter-spacing:2px;margin:4px 0 2px;}
.stage-myth{font-size:11px;color:var(--muted);letter-spacing:1px;}
#prog{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:14px;overflow:hidden;}
#prog>div{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:width .5s;}

#stage-body{position:relative;z-index:2;width:100%;max-width:720px;margin:0 auto;flex:1;
  overflow-y:auto;padding:22px 20px 30px;-webkit-overflow-scrolling:touch;}
.narr{font-size:clamp(15px,4.2vw,18px);line-height:1.95;color:#efe8d6;margin-bottom:22px;
  text-shadow:0 1px 6px rgba(0,0,0,.7);white-space:pre-wrap;}
.prompt{font-size:14px;color:var(--gold-light);letter-spacing:.5px;margin:6px 0 10px;line-height:1.7;}
textarea{width:100%;min-height:96px;background:rgba(0,0,0,0.4);border:1px solid rgba(201,168,76,0.4);
  color:var(--text);font-family:inherit;font-size:15px;line-height:1.7;padding:12px 14px;border-radius:4px;resize:vertical;}
textarea:focus{outline:none;border-color:var(--gold);}
.choices{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.choice{text-align:left;padding:13px 16px;background:rgba(20,16,36,0.72);border:1px solid rgba(201,168,76,0.32);
  color:var(--text);border-radius:4px;cursor:pointer;font-family:inherit;font-size:14.5px;line-height:1.6;transition:all .2s;}
.choice:hover{border-color:var(--gold);background:rgba(40,32,64,0.8);transform:translateX(3px);}
.choice .tag{display:block;font-size:11px;color:var(--gold);opacity:.85;margin-top:6px;letter-spacing:1px;}
.next-wrap{margin-top:22px;text-align:right;}

/* HUD */
#hud{position:fixed;left:0;right:0;bottom:0;z-index:3;background:linear-gradient(180deg,transparent,rgba(6,4,14,0.9) 40%);
  padding:14px 18px 16px;display:none;}
#hud.on{display:block;}
.hud-inner{max-width:720px;margin:0 auto;display:flex;gap:16px;justify-content:center;}
.attr{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);}
.attr b{color:var(--gold-light);font-size:13px;min-width:20px;text-align:right;}
.bar{width:64px;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.bar>div{height:100%;transition:width .5s;}
.c>div{background:#e0603a;} .w>div{background:#5a8cff;} .h>div{background:#e05a9a;}

/* ending */
#ending{background:radial-gradient(ellipse at 50% 25%,#1b1240 0,#0a0820 55%,#06040e 100%);overflow-y:auto;justify-content:flex-start;padding-top:56px;}
.medal{width:150px;height:150px;object-fit:cover;border-radius:50%;border:3px solid var(--gold);
  box-shadow:0 0 46px rgba(201,168,76,0.4);margin-bottom:18px;}
.end-label{font-size:12px;letter-spacing:4px;color:var(--muted);}
.arch{font-size:clamp(26px,7vw,38px);color:var(--gold-light);letter-spacing:3px;margin:8px 0 4px;text-shadow:0 0 24px rgba(201,168,76,0.5);text-align:center;}
.arch-en{font-size:14px;letter-spacing:4px;color:var(--muted);margin-bottom:20px;}
.epic{max-width:620px;font-size:15.5px;line-height:2.05;color:#efe8d6;white-space:pre-wrap;text-align:center;
  border-top:1px solid rgba(201,168,76,0.25);border-bottom:1px solid rgba(201,168,76,0.25);padding:24px 6px;margin-bottom:22px;}
.end-attrs{display:flex;gap:20px;margin-bottom:26px;color:var(--muted);font-size:13px;}
.end-attrs b{color:var(--gold-light);}
.fadein{animation:fade 1s ease both;}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
</style>

<div id="app">
  <button id="lang-btn" onclick="toggleLang()">EN</button>
  <button id="music-btn" onclick="toggleMusic()" title="音樂 / Music">🔊</button>

  <!-- TITLE -->
  <section id="title" class="screen active">
    <div class="stars"></div>
    <img class="hero-circle" src="./images/img15.png" alt="" onerror="this.style.display='none'">
    <div class="t-zh" id="tt-zh">你的英雄旅程</div>
    <div class="t-en">YOUR OWN ODYSSEY</div>
    <div class="t-sub" id="tt-sub"></div>
    <button class="btn" onclick="begin()" id="tt-btn">啟程 · BEGIN</button>
  </section>

  <!-- JOURNEY -->
  <section id="journey" class="screen">
    <img id="bg" src="" alt="">
    <div id="veil"></div>
    <div id="top">
      <div class="stage-no" id="s-no"></div>
      <div class="stage-title" id="s-title"></div>
      <div class="stage-myth" id="s-myth"></div>
      <div id="prog"><div id="prog-fill"></div></div>
    </div>
    <div id="stage-body"></div>
  </section>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-inner">
      <div class="attr">⚔️<span id="l-c">勇氣</span><div class="bar c"><div id="b-c"></div></div><b id="v-c">10</b></div>
      <div class="attr">🌙<span id="l-w">智慧</span><div class="bar w"><div id="b-w"></div></div><b id="v-w">10</b></div>
      <div class="attr">❤️<span id="l-h">心</span><div class="bar h"><div id="b-h"></div></div><b id="v-h">10</b></div>
    </div>
  </div>

  <!-- ENDING -->
  <section id="ending" class="screen">
    <img class="medal" src="./images/img37.jpg" alt="" onerror="this.style.display='none'">
    <div class="end-label" id="e-label">你的英雄稱號</div>
    <div class="arch" id="e-arch"></div>
    <div class="arch-en" id="e-arch-en"></div>
    <div class="epic" id="e-epic"></div>
    <div class="end-attrs" id="e-attrs"></div>
    <button class="btn btn-sm" onclick="restart()" id="e-btn">再走一次 · AGAIN</button>
  </section>
</div>

<script>
// ═══════════════ i18n scaffolding ═══════════════
let LANG='zh';
const UI={
  zh:{titleSub:'這一次，英雄不是別人——是你。\n走過坎伯的十二道門檻，把神話寫成你自己的故事。',
      begin:'啟程 · BEGIN', courage:'勇氣', wisdom:'智慧', heart:'心',
      write:'（寫下你的答案，或留白也可以）', next:'繼續 ▶', choose:'然後，選擇你面對它的方式：',
      endLabel:'你的英雄稱號', again:'再走一次 · AGAIN', skip:'我還沒有答案，繼續 ▶'},
  en:{titleSub:'This time the hero is not someone else — it is you.\nWalk Campbell’s twelve thresholds and write the myth as your own.',
      begin:'BEGIN', courage:'Courage', wisdom:'Wisdom', heart:'Heart',
      write:'(write your answer, or leave it blank)', next:'Continue ▶', choose:'Then choose how you meet it:',
      endLabel:'Your Hero Title', again:'WALK AGAIN', skip:'No answer yet — continue ▶'}
};

// ═══════════════ the twelve thresholds ═══════════════
// bg uses the real committed filenames (mixed .jpg/.png)
const STAGES=[
 {bg:'./images/img3.jpg', mood:'calm',
  zh:{title:'平凡的世界', myth:'一 · Ordinary World',
      narr:'每個英雄都始於一個看似平凡的地方。\n那裡安全、熟悉，卻有一絲說不出的空。你還不知道，這份不滿足正是旅程的第一聲鼓響。',
      prompt:'描述你此刻的「平凡世界」——那個安穩、卻讓你隱隱不甘的日常。',
      choices:[{t:'我珍惜它的安穩，但心底知道這不是全部。',a:{heart:1,wisdom:1},w:'不甘於平凡'},
               {t:'我早已厭倦，只是還沒勇氣離開。',a:{courage:1},w:'渴望改變'},
               {t:'我甚至沒察覺自己被困住——直到此刻。',a:{wisdom:2},w:'初次覺醒'}]},
  en:{title:'The Ordinary World', myth:'I · Ordinary World',
      narr:'Every hero begins somewhere ordinary.\nSafe, familiar — and quietly hollow. You do not yet know that this unrest is the first drumbeat of the road.',
      prompt:'Describe the "ordinary world" you live in now — safe, yet secretly not enough.',
      choices:[{t:'I treasure its safety, but I know it is not everything.',a:{heart:1,wisdom:1},w:'restless in comfort'},
               {t:'I am already weary of it — I only lack the courage to leave.',a:{courage:1},w:'longing to change'},
               {t:'I did not even see the cage — until now.',a:{wisdom:2},w:'first awakening'}]}},

 {bg:'./images/img4.jpg', mood:'drive',
  zh:{title:'冒險的召喚', myth:'二 · Call to Adventure',
      narr:'一封信、一個念頭、一次相遇——某樣東西在遠處輕聲說：「來。」\n召喚從不喧嘩，它只是不肯離去。',
      prompt:'什麼在呼喚你？那件你一直想做、卻還沒開始的事。',
      choices:[{t:'一個夢想，我假裝忘記，其實從未放下。',a:{heart:2},w:'未竟之夢'},
               {t:'一個必須面對的難題，我逃不掉了。',a:{courage:2},w:'無可迴避'},
               {t:'一種想成為更好的人的渴望。',a:{wisdom:1,heart:1},w:'向上的渴望'}]},
  en:{title:'The Call to Adventure', myth:'II · Call to Adventure',
      narr:'A letter, a thought, a meeting — something whispers from afar: "Come."\nThe call is never loud. It simply refuses to leave.',
      prompt:'What calls you? The thing you have always wanted to do, but never begun.',
      choices:[{t:'A dream I pretended to forget, but never let go.',a:{heart:2},w:'an unfinished dream'},
               {t:'A problem I can no longer run from.',a:{courage:2},w:'the unavoidable'},
               {t:'A longing to become a better person.',a:{wisdom:1,heart:1},w:'the reach upward'}]}},

 {bg:'./images/img5.png', mood:'tense',
  zh:{title:'拒絕召喚', myth:'三 · Refusal of the Call',
      narr:'每個真實的英雄都曾說過「不」。\n恐懼會替你找到一百個理由留下。承認它——那不是懦弱，是你將要跨越的東西。',
      prompt:'你在害怕什麼？是什麼讓你遲遲不敢踏出那一步。',
      choices:[{t:'怕失敗，怕證明自己其實不夠好。',a:{wisdom:1},w:'直視恐懼'},
               {t:'怕失去現在擁有的一切。',a:{heart:1,wisdom:1},w:'看清代價'},
               {t:'我承認我在怕——然後決定照樣前進。',a:{courage:2},w:'帶著恐懼前行'}]},
  en:{title:'Refusal of the Call', myth:'III · Refusal of the Call',
      narr:'Every true hero once said "no."\nFear will find you a hundred reasons to stay. Name it — that is not weakness; it is the very thing you will cross.',
      prompt:'What are you afraid of? What keeps you from taking the step.',
      choices:[{t:'Fear of failing — of proving I was never enough.',a:{wisdom:1},w:'facing the fear'},
               {t:'Fear of losing everything I already have.',a:{heart:1,wisdom:1},w:'seeing the cost'},
               {t:'I admit I am afraid — and decide to go anyway.',a:{courage:2},w:'moving with fear'}]}},

 {bg:'./images/img6.jpg', mood:'mystic',
  zh:{title:'遇見導師', myth:'四 · Meeting the Mentor',
      narr:'就在你最猶豫時，光出現了。\n它可能是一個人、一句話、一本書、一段記憶。導師不會替你走路——他只給你一把劍。',
      prompt:'誰是你的導師？（一個人、一句話、一本書）他給了你什麼力量？',
      choices:[{t:'一個曾相信我的人，即使我不相信自己。',a:{heart:2},w:'被愛托住'},
               {t:'一句我一直記著的話。',a:{wisdom:2},w:'一盞燈'},
               {t:'我自己走過的苦，教會了我。',a:{courage:1,wisdom:1},w:'以傷為師'}]},
  en:{title:'Meeting the Mentor', myth:'IV · Meeting the Mentor',
      narr:'Just as you waver, a light appears.\nA person, a sentence, a book, a memory. The mentor cannot walk for you — they only hand you a sword.',
      prompt:'Who is your mentor — a person, a line, a book? What strength did they give you?',
      choices:[{t:'Someone who believed in me when I could not.',a:{heart:2},w:'held by love'},
               {t:'A single sentence I have never forgotten.',a:{wisdom:2},w:'a lantern'},
               {t:'My own suffering became my teacher.',a:{courage:1,wisdom:1},w:'taught by the wound'}]}},

 {bg:'./images/img7.png', mood:'drive',
  zh:{title:'跨越門檻', myth:'五 · Crossing the Threshold',
      narr:'讀再多地圖，也不算真正出發。\n門檻只有一種跨越方式：踏出那一步，讓身後的世界永遠變了。',
      prompt:'如果今天就要跨出第一步，那一步具體是什麼？',
      choices:[{t:'一個我今天就能做的小行動。',a:{courage:1,wisdom:1},w:'務實的一步'},
               {t:'一個我拖了很久、終於要說出口的決定。',a:{courage:2},w:'破釜沉舟'},
               {t:'放下一樣舊的東西，才能騰出手。',a:{heart:2},w:'學會放手'}]},
  en:{title:'Crossing the Threshold', myth:'V · Crossing the Threshold',
      narr:'No map, however long, counts as setting out.\nThe threshold is crossed one way only: take the step, and the world behind you is changed forever.',
      prompt:'If you had to take the first step today — what exactly would it be?',
      choices:[{t:'One small action I can take today.',a:{courage:1,wisdom:1},w:'the practical step'},
               {t:'A decision I have delayed, and will finally speak aloud.',a:{courage:2},w:'burning the boats'},
               {t:'Letting go of something old to free my hands.',a:{heart:2},w:'learning to release'}]}},

 {bg:'./images/img8.jpg', mood:'epic',
  zh:{title:'試煉、盟友與敵人', myth:'六 · Tests, Allies, Enemies',
      narr:'路開始展現它的牙齒。\n有人與你並肩，有人擋在你前。而最難纏的敵人，往往戴著你自己的臉。',
      prompt:'這條路上，誰與你並肩？誰（或什麼）是你要面對的阻力？',
      choices:[{t:'我有並肩的人，這讓我走得更遠。',a:{heart:2},w:'不再獨行'},
               {t:'最大的敵人是我自己的懷疑。',a:{wisdom:2},w:'與自己交手'},
               {t:'阻力很多，但我學會了選擇戰場。',a:{courage:1,wisdom:1},w:'懂得取捨'}]},
  en:{title:'Tests, Allies & Enemies', myth:'VI · Tests, Allies, Enemies',
      narr:'The road begins to bare its teeth.\nSome walk beside you, some stand in your way. And the fiercest enemy often wears your own face.',
      prompt:'Who walks beside you on this road? Who — or what — must you face?',
      choices:[{t:'I have people beside me, and they carry me further.',a:{heart:2},w:'no longer alone'},
               {t:'My greatest enemy is my own doubt.',a:{wisdom:2},w:'wrestling the self'},
               {t:'There is much resistance, but I have learned to choose my battles.',a:{courage:1,wisdom:1},w:'choosing wisely'}]}},

 {bg:'./images/img9.jpg', mood:'tense',
  zh:{title:'洞穴最深處', myth:'七 · Approach the Inmost Cave',
      narr:'現在你站在黑暗的入口。\n再往前，就是你一直繞道而行的地方——那個你最不願承認的真相。',
      prompt:'你最深的恐懼，或最不想面對的真相，是什麼？',
      choices:[{t:'我怕自己終究不夠好、不被愛。',a:{heart:1,wisdom:1},w:'渴望被接住'},
               {t:'我一直逃避的一段過去。',a:{courage:1,wisdom:1},w:'回望傷口'},
               {t:'我終於敢說出它的名字了。',a:{courage:2},w:'直呼其名'}]},
  en:{title:'Approach the Inmost Cave', myth:'VII · The Inmost Cave',
      narr:'Now you stand at the mouth of the dark.\nBeyond it lies the place you kept circling around — the truth you least wish to admit.',
      prompt:'What is your deepest fear, or the truth you least want to face?',
      choices:[{t:'That I am not enough — that I will not be loved.',a:{heart:1,wisdom:1},w:'longing to be held'},
               {t:'A past I have spent years avoiding.',a:{courage:1,wisdom:1},w:'facing the wound'},
               {t:'I can finally say its name aloud.',a:{courage:2},w:'naming it'}]}},

 {bg:'./images/img10.jpg', mood:'epic',
  zh:{title:'磨難', myth:'八 · The Ordeal',
      narr:'這是舊的你死去的地方。\n最深的夜，最重的一擊。但神話說：唯有走進死亡，才能帶著新的生命走出來。',
      prompt:'你人生中最艱難的一關是什麼？你是如何撐過來的？',
      choices:[{t:'我靠著一口氣、一個人、一個理由撐了下來。',a:{heart:2,courage:1},w:'向死而生'},
               {t:'我崩解過，然後一塊一塊把自己拼回來。',a:{courage:2,wisdom:1},w:'浴火重生'},
               {t:'它還沒過去——但我還站著。',a:{courage:3},w:'仍在戰鬥'}]},
  en:{title:'The Ordeal', myth:'VIII · The Ordeal',
      narr:'This is where the old you dies.\nThe deepest night, the heaviest blow. Yet the myth says: only by walking into death do you walk back out with new life.',
      prompt:'What was the hardest trial of your life? How did you survive it?',
      choices:[{t:'One breath, one person, one reason kept me alive.',a:{heart:2,courage:1},w:'life out of death'},
               {t:'I fell apart, then rebuilt myself piece by piece.',a:{courage:2,wisdom:1},w:'reborn in fire'},
               {t:'It is not over yet — but I am still standing.',a:{courage:3},w:'still fighting'}]}},

 {bg:'./images/img11.png', mood:'triumph',
  zh:{title:'獎賞', myth:'九 · The Reward',
      narr:'從深淵歸來的人，手裡總握著什麼。\n那不一定是黃金——更多時候，是一種再也奪不走的清明。',

// ═══════════════ state ═══════════════
const G={i:0, attrs:{courage:10,wisdom:10,heart:10}, answers:[], traits:[], phase:'narr'};
const L=()=>LANG;
const clamp=v=>Math.max(0,Math.min(20,v));

function applyLang(){
  const u=UI[LANG];
  document.getElementById('lang-btn').textContent = LANG==='zh'?'EN':'中';
  document.getElementById('tt-zh').textContent = LANG==='zh'?'你的英雄旅程':'Your Own Odyssey';
  document.getElementById('tt-sub').textContent = u.titleSub;
  document.getElementById('tt-btn').textContent = u.begin;
  document.getElementById('l-c').textContent=u.courage;
  document.getElementById('l-w').textContent=u.wisdom;
  document.getElementById('l-h').textContent=u.heart;
  document.getElementById('e-label').textContent=u.endLabel;
  document.getElementById('e-btn').textContent=u.again;
}
function toggleLang(){ LANG = LANG==='zh'?'en':'zh'; applyLang();
  if(document.getElementById('journey').classList.contains('active')) renderStage(true);
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const th={title:'epic', ending:'triumph'};
  if(th[id] && window.Music) Music.set(th[id]);
}
function begin(){ G.i=0; show('journey'); document.getElementById('hud').classList.add('on'); renderStage(); }
function restart(){ G.i=0; G.attrs={courage:10,wisdom:10,heart:10}; G.answers=[]; G.traits=[];
  document.getElementById('hud').classList.remove('on'); show('title'); }

function updateHUD(){
  const a=G.attrs;
  for(const [k,short] of [['courage','c'],['wisdom','w'],['heart','h']]){
    document.getElementById('v-'+short).textContent=a[k];
    document.getElementById('b-'+short).style.width=(a[k]/20*100)+'%';
  }
}

function renderStage(keepInput){
  const st=STAGES[G.i], d=st[L()], u=UI[LANG];
  document.getElementById('bg').src=st.bg;
  document.getElementById('bg').onerror=function(){this.style.opacity=0;};
  document.getElementById('s-no').textContent=(LANG==='zh'?'第 ':'Threshold ')+(G.i+1)+(LANG==='zh'?' 道門檻 / 共 12':' / 12');
  document.getElementById('s-title').textContent=d.title;
  document.getElementById('s-myth').textContent=d.myth;
  document.getElementById('prog-fill').style.width=((G.i)/12*100)+'%';
  if(window.Music) Music.set(st.mood);
  updateHUD();

  const prev = keepInput ? (document.querySelector('#answer')?document.querySelector('#answer').value:'') : '';
  const body=document.getElementById('stage-body');
  body.innerHTML='';
  const narr=document.createElement('div'); narr.className='narr fadein'; narr.textContent=d.narr; body.appendChild(narr);
  const pr=document.createElement('div'); pr.className='prompt'; pr.textContent=d.prompt; body.appendChild(pr);
  const ta=document.createElement('textarea'); ta.id='answer'; ta.placeholder=u.write; ta.value=prev; body.appendChild(ta);
  const ch=document.createElement('div'); ch.className='prompt'; ch.style.marginTop='16px'; ch.textContent=u.choose; body.appendChild(ch);
  const cw=document.createElement('div'); cw.className='choices';
  d.choices.forEach((c,idx)=>{
    const btn=document.createElement('button'); btn.className='choice';
    btn.innerHTML=`${c.t}<span class="tag">✦ ${c.w}</span>`;
    btn.onclick=()=>choose(idx);
    cw.appendChild(btn);
  });
  body.appendChild(cw);
  body.scrollTop=0;
}

function choose(idx){
  const st=STAGES[G.i], d=st[L()], c=d.choices[idx];
  const ans=(document.querySelector('#answer')?.value||'').trim();
  G.answers[G.i]=ans;
  G.traits[G.i]=c.w;
  for(const k in c.a){ G.attrs[k]=clamp(G.attrs[k]+c.a[k]); }
  updateHUD();
  document.getElementById('prog-fill').style.width=((G.i+1)/12*100)+'%';
  G.i++;
  if(G.i>=STAGES.length) finish();
  else renderStage();
}

// ═══════════════ ending: forge the personal epic ═══════════════
function archetype(){
  const {courage:c,wisdom:w,heart:h}=G.attrs;
  const mx=Math.max(c,w,h), spread=mx-Math.min(c,w,h);
  if(spread<=2) return {zh:'完整之人',en:'The Whole One',
    dz:'你不偏不倚地走完了全程——勇氣、智慧與心在你身上達成了罕見的平衡。你不是某一種英雄，你是完整的那一種。',
    de:'You walked the whole road in balance — courage, wisdom and heart met in rare equilibrium. You are not one kind of hero; you are the whole kind.'};
  if(c===mx) return {zh:'烈焰的持火者',en:'The Flamebearer',
    dz:'你以勇氣為劍，一次次走進自己最怕的黑暗。你留給世界的，是一團敢於啟程的火。',
    de:'You made courage your sword and walked, again and again, into the dark you feared most. What you leave the world is a flame that dares to set out.'};
  if(w===mx) return {zh:'觀星的智者',en:'The Starseer',
    dz:'你以智慧為燈，在最深的夜裡讀懂了方向。你留給世界的，是一道能被後人跟隨的光。',
    de:'You made wisdom your lantern and read the way through the deepest night. What you leave the world is a light others can follow.'};
  return {zh:'破曉的守護者',en:'The Dawnkeeper',
    dz:'你以心為盾，穿過苦難仍選擇溫柔。你留給世界的，是一份能接住別人的愛。',
    de:'You made your heart a shield and, through all the suffering, still chose tenderness. What you leave the world is a love that can hold others up.'};
}

function forgeEpic(){
  const arch=archetype();
  const {courage:c,wisdom:w,heart:h}=G.attrs;
  const answered=G.answers.map((a,i)=>({a:(a||'').trim(),i})).filter(x=>x.a);
  const lines=[];
  if(LANG==='zh'){
    lines.push('這是你的史詩——由你自己的話寫成。');
    lines.push('');
    if(G.answers[0]) lines.push('你曾困於平凡：「'+trim(G.answers[0])+'」');
    if(G.answers[1]) lines.push('但遠方有聲音喚你：「'+trim(G.answers[1])+'」');
    if(G.answers[6]||G.answers[7]) lines.push('你走進最深的黑暗，面對「'+trim(G.answers[6]||G.answers[7])+'」。');
    if(G.answers[8]) lines.push('你從中帶回了寶物：「'+trim(G.answers[8])+'」');
    if(G.answers[10]||G.answers[11]) lines.push('而你選擇把它獻給世界：「'+trim(G.answers[11]||G.answers[10])+'」');
    lines.push('');
    lines.push('於是眾神為你命名——');
    lines.push('「'+arch.zh+'」。');
    lines.push(arch.dz);
    if(answered.length===0){
      lines.length=0;
      lines.push('你走完了十二道門檻，話語留在心裡未曾說出。');
      lines.push('但路已經記得你。眾神為你命名——「'+arch.zh+'」。');
      lines.push(arch.dz);
    }
  } else {
    lines.push('This is your epic — written in your own words.');
    lines.push('');
    if(G.answers[0]) lines.push('You were bound to the ordinary: "'+trim(G.answers[0])+'"');
    if(G.answers[1]) lines.push('Yet a voice called from afar: "'+trim(G.answers[1])+'"');
    if(G.answers[6]||G.answers[7]) lines.push('You entered the deepest dark to face "'+trim(G.answers[6]||G.answers[7])+'".');
    if(G.answers[8]) lines.push('From it you carried a treasure: "'+trim(G.answers[8])+'"');
    if(G.answers[10]||G.answers[11]) lines.push('And you chose to give it to the world: "'+trim(G.answers[11]||G.answers[10])+'"');
    lines.push('');
    lines.push('And so the gods name you —');
    lines.push('"'+arch.en+'".');
    lines.push(arch.de);
    if(answered.length===0){
      lines.length=0;
      lines.push('You crossed all twelve thresholds, your words kept silent within.');
      lines.push('But the road remembers you. The gods name you — "'+arch.en+'".');
      lines.push(arch.de);
    }
  }
  return {arch, text:lines.join('\n')};
}
function trim(s){ s=(s||'').trim(); return s.length>90?s.slice(0,88)+'…':s; }

function finish(){
  const {arch,text}=forgeEpic();
  document.getElementById('e-arch').textContent=arch.zh;
  document.getElementById('e-arch-en').textContent=arch.en;
  document.getElementById('e-epic').textContent=text;
  const a=G.attrs, u=UI[LANG];
  document.getElementById('e-attrs').innerHTML=
    `<span>⚔️ ${u.courage} <b>${a.courage}</b></span><span>🌙 ${u.wisdom} <b>${a.wisdom}</b></span><span>❤️ ${u.heart} <b>${a.heart}</b></span>`;
  document.getElementById('hud').classList.remove('on');
  document.getElementById('prog-fill').style.width='100%';
  show('ending');
}

// ═══════════════ music (shared engine) ═══════════════
const Music = (function(){
  let ctx=null, master=null, bus=null, timer=null;
  let muted=false, nextBarTime=0, barIx=0;
  let current='epic', pending='epic';
  const NOTE={A:0,'A#':1,B:2,C:3,'C#':4,D:5,'D#':6,E:7,F:8,'F#':9,G:10,'G#':11};
  const hz=(root,s)=>root*Math.pow(2,s/12);
  const triad=(name,type)=>{const r=NOTE[name],t=type==='min'?3:4;return [r,r+t,r+7];};

  function impulse(sec,decay){
    const rate=ctx.sampleRate,len=Math.floor(rate*sec),buf=ctx.createBuffer(2,len,rate);
    for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
    return buf;
  }
  function ensure(){
    if(ctx) return true;
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC) return false;
    ctx=new AC();
    master=ctx.createGain(); master.gain.value=muted?0:0.30;
    const comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-16; comp.ratio.value=3; comp.attack.value=0.006; comp.release.value=0.3;
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=6200;
    master.connect(comp); comp.connect(lp); lp.connect(ctx.destination);
    // instrument bus -> dry + reverb (lush hall for an epic, less "raw" sound)
    bus=ctx.createGain(); bus.connect(master);
    const rev=ctx.createConvolver(); rev.buffer=impulse(2.8,2.2);
    const wet=ctx.createGain(); wet.gain.value=0.85;
    bus.connect(rev); rev.connect(wet); wet.connect(master);
    return true;
  }

  // ── warm layered voice: two slightly-detuned oscillators through a lowpass,
  //    smooth ADSR, optional gentle vibrato — far softer than a bare sawtooth ──
  function voice(t,freq,dur,o){
    o=o||{};
    const peak=o.peak!=null?o.peak:0.14,a=o.a!=null?o.a:0.04,r=o.r!=null?o.r:0.25;
    const cut=o.cut||2600,type=o.type||'sawtooth';
    const g=ctx.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(peak,t+a);
    g.gain.setValueAtTime(peak,t+Math.max(a+0.005,dur-r));
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cut;
    f.connect(g); g.connect(bus);
    const base=o.detune||0;
    const mk=(det)=>{const os=ctx.createOscillator();os.type=type;os.frequency.value=freq;os.detune.value=det;os.connect(f);os.start(t);os.stop(t+dur+0.06);return os;};
    const o1=mk(base-6),o2=mk(base+6);
    if(o.vib){const vo=ctx.createOscillator();vo.type='sine';vo.frequency.value=5.2;const vg=ctx.createGain();vg.gain.value=o.vib;vo.connect(vg);vg.connect(o1.detune);vg.connect(o2.detune);vo.start(t);vo.stop(t+dur+0.06);}
  }
  const strings=(t,tri,dur,gain)=>tri.concat([tri[0]+12]).forEach(s=>voice(t,hz(110,s),dur,{peak:gain||0.05,a:0.55,r:0.75,cut:1300,type:'sawtooth'}));
  const brass=(t,tri,dur,gain)=>tri.concat([tri[0]+12]).forEach((s,i)=>voice(t,hz(110,s),dur,{peak:(gain||0.08)/(1+i*0.2),a:0.05,r:0.18,cut:2000,type:'sawtooth',detune:i%2?5:-5}));
  const melo=(t,semi,dur,gain,base)=>voice(t,hz(base||220,semi),dur,{peak:gain||0.16,a:0.06,r:0.2,cut:3000,type:'triangle',vib:6});
  const harp=(t,semi,dur,base)=>voice(t,hz(base||220,semi),dur||0.5,{peak:0.1,a:0.006,r:0.45,cut:3200,type:'triangle'});
  function bassv(t,semi,dur,gain){
    voice(t,hz(55,semi),dur,{peak:gain||0.24,a:0.02,r:0.14,cut:1300,type:'triangle'});
    const o=ctx.createOscillator();o.type='sine';o.frequency.value=hz(55,semi);
    const g=ctx.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime((gain||0.24)*0.7,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(bus);o.start(t);o.stop(t+dur+0.05);
  }
  function thump(t,gain){const o=ctx.createOscillator();o.type='sine';const g=ctx.createGain();o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(45,t+0.18);g.gain.setValueAtTime(gain||0.6,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.34);o.connect(g);g.connect(master);o.start(t);o.stop(t+0.4);}
  function crash(t,gain,dur,hp){const len=Math.floor(ctx.sampleRate*(dur||0.4));const buf=ctx.createBuffer(1,len,ctx.sampleRate);const d=buf.getChannelData(0);for(let k=0;k<len;k++)d[k]=(Math.random()*2-1)*Math.pow(1-k/len,1.4);const n=ctx.createBufferSource();n.buffer=buf;const f=ctx.createBiquadFilter();f.type='highpass';f.frequency.value=hp||3000;const g=ctx.createGain();g.gain.value=gain||0.1;n.connect(f);f.connect(g);g.connect(bus);n.start(t);}

  // ── melodies as bars of [semitone(from base), beatOffset, durBeats] ──
  // Ode to Joy (Beethoven, public domain) — semitones relative to A(220), key of C
  const ODE=[
    [[7,0,1],[7,1,1],[8,2,1],[10,3,1]],
    [[10,0,1],[8,1,1],[7,2,1],[5,3,1]],
    [[3,0,1],[3,1,1],[5,2,1],[7,3,1]],
    [[7,0,1.5],[5,1.5,0.5],[5,2,2]],
    [[7,0,1],[7,1,1],[8,2,1],[10,3,1]],
    [[10,0,1],[8,1,1],[7,2,1],[5,3,1]],
    [[3,0,1],[3,1,1],[5,2,1],[7,3,1]],
    [[5,0,1.5],[3,1.5,0.5],[3,2,2]]
  ];
  // Original heroic line in A minor over Am–F–C–G
  const HERO=[
    [[12,0,2],[15,2,1],[12,3,1]],
    [[17,0,2],[15,2,1],[12,3,1]],
    [[15,0,1],[14,1,1],[12,2,2]],
    [[14,0,1],[12,1,1],[10,2,1],[7,3,1]]
  ];
  const playMel=(t,i,bars,base,gain,spb)=>{const bar=bars[i%bars.length];for(const [s,off,dur] of bar)melo(t+off*spb,s,dur*spb*0.96,gain,base);};

  // ── themes: schedule one full 4/4 bar given start time t and bar index i ──
  const THEMES={
    epic:{bpm:120,beats:4,prog:[['A','min'],['F','maj'],['C','maj'],['G','maj']],
      bar(t,i){const spb=60/this.bpm,[rn,ty]=this.prog[i%4],tri=triad(rn,ty),rs=NOTE[rn];
        strings(t,tri,spb*4,0.05); brass(t,tri,spb*1.9,0.08); brass(t+spb*2,tri,spb*1.9,0.07);
        for(let e=0;e<8;e++)bassv(t+e*spb/2,rs+(e%2?12:0),spb*0.46,0.24);
        thump(t,0.7);thump(t+spb*2,0.58);thump(t+spb*1.5,0.28);thump(t+spb*3.5,0.32);
        if(i%4===0)crash(t,0.1,0.4,3400);
        playMel(t,i,HERO,220,0.17,spb);}},
    triumph:{bpm:104,beats:4,prog:[['C','maj'],['G','maj'],['C','maj'],['G','maj'],['C','maj'],['G','maj'],['A','min'],['G','maj']],
      bar(t,i){const spb=60/this.bpm,[rn,ty]=this.prog[i%this.prog.length],tri=triad(rn,ty),rs=NOTE[rn];
        strings(t,tri,spb*4,0.055); brass(t,tri,spb*3.8,0.055);
        for(let e=0;e<4;e++)bassv(t+e*spb,rs+(e%2?12:0),spb*0.9,0.22);
        thump(t,0.62);thump(t+spb*2,0.5);
        if(i%4===0)crash(t,0.09,0.45,3200);
        playMel(t,i,ODE,220,0.2,spb);}},
    drive:{bpm:148,beats:4,prog:[['A','min'],['G','maj'],['F','maj'],['G','maj']],
      bar(t,i){const spb=60/this.bpm,[rn,ty]=this.prog[i%4],tri=triad(rn,ty),rs=NOTE[rn];

    ambient:{bpm:60,beats:4,prog:[['A','min'],['A','min'],['F','maj'],['C','maj']],
      bar(t,i){const spb=60/this.bpm,[rn,ty]=this.prog[i%4],tri=triad(rn,ty),rs=NOTE[rn];

        const sc=[0,3,7,10,12];if(Math.random()<0.7)harp(t+spb*(1+Math.floor(Math.random()*3)),sc[Math.floor(Math.random()*sc.length)],1.2,220);}},

  };

  function scheduler(){
    if(!ctx) return;
    while(nextBarTime < ctx.currentTime + 0.25){
      const th=THEMES[current]||THEMES.epic;
      try{ th.bar(nextBarTime, barIx); }catch(e){}
      nextBarTime += (60/th.bpm)*th.beats;
      barIx++;
      if(pending!==current){ current=pending; barIx=0; }   // switch on bar boundary
    }
  }

  return {
    start(){
      if(!ensure()) return;
      if(ctx.state==='suspended') ctx.resume();
      if(!timer){ nextBarTime=ctx.currentTime+0.1; barIx=0; timer=setInterval(scheduler,25); }
    },
    set(name){ if(THEMES[name]){ pending=name; if(!timer) current=name; } },
    toggle(){ muted=!muted; if(master) master.gain.setTargetAtTime(muted?0:0.30, ctx.currentTime, 0.05); if(!muted) this.start(); return muted; },
    isMuted(){ return muted; },
    running(){ return !!(ctx && ctx.state==='running'); }
  };
})();

  if(!silentEl){ silentEl=document.createElement('audio'); silentEl.setAttribute('playsinline','');
    silentEl.loop=true; silentEl.volume=0.001; silentEl.src='data:audio/wav;base64,UklGRqQHAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YYAHAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='; }
  silentEl.play().catch(()=>{});
  Music.start();
  if(Music.running()){ ['pointerdown','touchstart','touchend','mousedown','click','keydown']
    .forEach(ev=>document.removeEventListener(ev,unlockAudio)); }
}
